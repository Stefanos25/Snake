<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }

    .phone {
      background: #2a2a3e;
      border-radius: 30px;
      padding: 20px 16px 30px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      border: 2px solid #3a3a5e;
    }

    .screen-bezel {
      background: #111;
      border-radius: 8px;
      padding: 10px;
      border: 3px solid #444;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      color: #4cff4c;
      font-size: 13px;
      margin-bottom: 6px;
      width: 240px;
      letter-spacing: 1px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    .message {
      color: #4cff4c;
      font-size: 12px;
      text-align: center;
      margin-top: 6px;
      height: 16px;
      letter-spacing: 1px;
    }

    .dpad {
      display: grid;
      grid-template-columns: 40px 40px 40px;
      grid-template-rows: 40px 40px 40px;
      gap: 4px;
    }

    .dpad button {
      background: #3a3a5e;
      border: 1px solid #555;
      border-radius: 6px;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad button:active { background: #5a5a8e; }
    .dpad .empty { background: transparent; border: none; }

    .btn-start {
      background: #3a3a5e;
      border: 1px solid #555;
      border-radius: 12px;
      color: #aaa;
      font-size: 11px;
      padding: 6px 18px;
      cursor: pointer;
      letter-spacing: 1px;
      font-family: 'Courier New', monospace;
    }
    .btn-start:active { background: #5a5a8e; }

    .controls-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-keys {
      background: #3a3a5e;
      border: 1px solid #555;
      border-radius: 12px;
      color: #aaa;
      font-size: 11px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      font-family: 'Courier New', monospace;
    }
    .btn-keys:active { background: #5a5a8e; }
    .btn-keys.active { color: #4cff4c; border-color: #4cff4c; }

    .key-panel {
      display: none;
      background: #1a1a2e;
      border: 1px solid #3a3a5e;
      border-radius: 8px;
      padding: 10px 14px;
      width: 188px;
    }
    .key-panel.visible { display: block; }

    .key-panel-title {
      color: #4cff4c;
      font-size: 10px;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 8px;
      font-family: 'Courier New', monospace;
    }

    .key-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .key-label {
      color: #888;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    .key-btn {
      background: #3a3a5e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ccc;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      padding: 3px 0;
      cursor: pointer;
      width: 52px;
      text-align: center;
      letter-spacing: 1px;
      transition: all 0.1s;
    }
    .key-btn:hover { border-color: #888; color: #fff; }
    .key-btn.listening { border-color: #4cff4c; color: #4cff4c; animation: blink 0.7s step-end infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .key-reset {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #555;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      padding: 3px 0;
      cursor: pointer;
      letter-spacing: 1px;
      width: 100%;
      margin-top: 6px;
      transition: all 0.1s;
    }
    .key-reset:hover { border-color: #666; color: #999; }
  </style>
</head>
<body>
<div class="phone">
  <div class="screen-bezel">
    <div class="hud">
      <span>SCORE: <span id="score">0</span></span>
      <span>HI: <span id="hi">0</span></span>
    </div>
    <canvas id="canvas" width="240" height="240"></canvas>
    <div class="message" id="msg">PRESS START</div>
  </div>

  <div class="controls-row">
    <button class="btn-start" id="startBtn">START</button>
    <button class="btn-keys" id="keysBtn">KEYS</button>
  </div>

  <div class="dpad">
    <div class="empty"></div>
    <button id="up">▲</button>
    <div class="empty"></div>
    <button id="left">◀</button>
    <div class="empty"></div>
    <button id="right">▶</button>
    <div class="empty"></div>
    <button id="down">▼</button>
    <div class="empty"></div>
  </div>

  <div class="key-panel" id="keyPanel">
    <div class="key-panel-title">KEY BINDINGS</div>
    <div class="key-row">
      <span class="key-label">▲ UP</span>
      <button class="key-btn" id="kbtn-up"></button>
    </div>
    <div class="key-row">
      <span class="key-label">▼ DOWN</span>
      <button class="key-btn" id="kbtn-down"></button>
    </div>
    <div class="key-row">
      <span class="key-label">◀ LEFT</span>
      <button class="key-btn" id="kbtn-left"></button>
    </div>
    <div class="key-row">
      <span class="key-label">▶ RIGHT</span>
      <button class="key-btn" id="kbtn-right"></button>
    </div>
    <button class="key-reset" id="keyReset">RESET DEFAULTS</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiEl = document.getElementById('hi');
  const msgEl = document.getElementById('msg');

  const COLS = 20, ROWS = 20;
  const CELL = canvas.width / COLS;

  const BG   = '#0a1a0a';
  const GRID = '#0e200e';
  const HEAD = '#7fff7f';
  const BODY = '#4cff4c';
  const FOOD = '#ff4c4c';
  const DEAD = '#333';

  let snake, dir, nextDir, food, score, hiScore = 0, loop, alive, started;

  function init() {
    snake = [
      {x: 10, y: 10},
      {x:  9, y: 10},
      {x:  8, y: 10},
    ];
    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    score = 0;
    alive = true;
    started = false;
    scoreEl.textContent = 0;
    spawnFood();
    draw();
    msgEl.textContent = 'PRESS START';
  }

  const MARGIN = 2;
  function spawnFood() {
    let pos;
    do {
      pos = {
        x: MARGIN + Math.floor(Math.random() * (COLS - MARGIN * 2)),
        y: MARGIN + Math.floor(Math.random() * (ROWS - MARGIN * 2)),
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function step() {
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > hiScore) { hiScore = score; hiEl.textContent = hiScore; }
      spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    alive = false;
    clearInterval(loop);
    drawDead();
    msgEl.textContent = 'GAME OVER!';
  }

  function draw() {
    // Background
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = GRID;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        ctx.fillRect(c * CELL + CELL/2 - 0.5, r * CELL + CELL/2 - 0.5, 1, 1);
      }
    }

    // Food (blinking handled by draw call rhythm — always visible here)
    const fx = food.x * CELL, fy = food.y * CELL;
    ctx.fillStyle = FOOD;
    ctx.fillRect(fx + 2, fy + 2, CELL - 4, CELL - 4);

    // Snake body
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      ctx.fillStyle = i === 0 ? HEAD : BODY;
      const inset = i === 0 ? 1 : 2;
      ctx.fillRect(s.x * CELL + inset, s.y * CELL + inset, CELL - inset*2, CELL - inset*2);
    }
  }

  function drawDead() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (const s of snake) {
      ctx.fillStyle = DEAD;
      ctx.fillRect(s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4);
    }
  }

  function startGame() {
    clearInterval(loop);
    init();
    started = true;
    msgEl.textContent = '';
    const speed = 150;
    loop = setInterval(step, speed);
  }

  // Key bindings — arrow keys are always active; one customisable secondary key per direction
  const ARROW_KEYS = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' };
  const DEFAULT_CUSTOM_KEYS = { up: 'w', down: 's', left: 'a', right: 'd' };
  const DIRS = ['up', 'down', 'left', 'right'];
  const DIR_VECS = { up: {x:0,y:-1}, down: {x:0,y:1}, left: {x:-1,y:0}, right: {x:1,y:0} };
  const ANTI_CHECK = { up: () => dir.y !== 1, down: () => dir.y !== -1, left: () => dir.x !== 1, right: () => dir.x !== -1 };

  let customKeys = loadCustomKeys();
  let rebindingDir = null;

  function loadCustomKeys() {
    try {
      const saved = localStorage.getItem('snakeCustomKeys');
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return Object.assign({}, DEFAULT_CUSTOM_KEYS);
  }

  function saveCustomKeys() {
    try { localStorage.setItem('snakeCustomKeys', JSON.stringify(customKeys)); } catch(e) {}
  }

  function formatKey(key) {
    if (!key) return '—';
    const map = { ArrowUp:'↑', ArrowDown:'↓', ArrowLeft:'←', ArrowRight:'→', ' ':'SPC', Escape:'ESC', Enter:'ENT', Backspace:'BSP', Tab:'TAB' };
    return map[key] || (key.length === 1 ? key.toUpperCase() : key);
  }

  function updateBindingDisplay() {
    DIRS.forEach(d => {
      const btn = document.getElementById('kbtn-' + d);
      btn.textContent = formatKey(customKeys[d]);
    });
  }

  function startRebind(dir) {
    rebindingDir = dir;
    DIRS.forEach(d => {
      const btn = document.getElementById('kbtn-' + d);
      btn.classList.toggle('listening', d === dir);
      btn.textContent = d === dir ? '...' : formatKey(customKeys[d]);
    });
    document.body.focus();
  }

  function cancelRebind() {
    rebindingDir = null;
    DIRS.forEach(d => document.getElementById('kbtn-' + d).classList.remove('listening'));
    updateBindingDisplay();
  }

  DIRS.forEach(d => {
    document.getElementById('kbtn-' + d).addEventListener('click', () => {
      if (rebindingDir === d) { cancelRebind(); return; }
      startRebind(d);
    });
  });

  document.getElementById('keyReset').addEventListener('click', () => {
    customKeys = Object.assign({}, DEFAULT_CUSTOM_KEYS);
    saveCustomKeys();
    cancelRebind();
  });

  document.getElementById('keysBtn').addEventListener('click', () => {
    const panel = document.getElementById('keyPanel');
    const btn = document.getElementById('keysBtn');
    const visible = panel.classList.toggle('visible');
    btn.classList.toggle('active', visible);
    if (!visible) cancelRebind();
  });

  updateBindingDisplay();

  // Keyboard controls
  document.addEventListener('keydown', e => {
    if (rebindingDir) {
      if (e.key === 'Escape') { cancelRebind(); e.preventDefault(); return; }
      // Arrow keys are always reserved as fallback — don't allow them in custom slot
      if (Object.values(ARROW_KEYS).includes(e.key)) return;
      // Remove this key from any other direction to avoid conflicts
      DIRS.forEach(d => { if (d !== rebindingDir && customKeys[d] && customKeys[d].toLowerCase() === e.key.toLowerCase()) customKeys[d] = null; });
      customKeys[rebindingDir] = e.key;
      saveCustomKeys();
      cancelRebind();
      e.preventDefault();
      return;
    }

    const k = e.key;
    for (const d of DIRS) {
      if (k === ARROW_KEYS[d] || (customKeys[d] && k.toLowerCase() === customKeys[d].toLowerCase())) {
        if (ANTI_CHECK[d]()) nextDir = DIR_VECS[d];
        e.preventDefault();
        return;
      }
    }
    if (k === 'Enter' || k === ' ') startGame();
  });

  // Ensure the page captures keyboard focus immediately
  document.body.setAttribute('tabindex', '0');
  document.body.focus();
  canvas.addEventListener('click', () => document.body.focus());

  // D-pad buttons — use touchstart for immediate response on iOS (preventDefault stops
  // the subsequent click from firing twice on desktop-like touch environments)
  function addDpadListener(id, handler) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); handler(); }, { passive: false });
    el.addEventListener('click', handler);
  }

  addDpadListener('up',    () => { if (dir.y !== 1)  nextDir = {x:0, y:-1}; });
  addDpadListener('down',  () => { if (dir.y !== -1) nextDir = {x:0, y: 1}; });
  addDpadListener('left',  () => { if (dir.x !== 1)  nextDir = {x:-1, y:0}; });
  addDpadListener('right', () => { if (dir.x !== -1) nextDir = {x: 1, y:0}; });
  document.getElementById('startBtn').addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });
  document.getElementById('startBtn').addEventListener('click', startGame);

  init();
</script>
</body>
</html>
